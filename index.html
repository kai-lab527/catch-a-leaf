<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catch-a-leaf-demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="gameContainer">
    <!-- HUD – floating widgets -->
    <div id="hud">
      <div class="hud-left">
        <!-- MONEY -->
        <div class="hud-stat" id="moneyCard">
          <span class="hud-icon" id="moneyIcon">¢</span>
          <div class="hud-info">
            <span class="hud-label">MONEY :</span>
            <span class="hud-value" id="moneyValue">0</span>
          </div>
        </div>

        <!-- NEXT SP -->
        <div class="hud-stat leaf-stat" id="leafCard">
          <span class="hud-icon" style="display:none;"></span>
          <div class="hud-info">
            <span class="hud-label">NEXT SP :</span>
            <span class="hud-value" id="leafValue">0 / 5</span>
          </div>
        </div>

        <!-- SKILL PTS -->
        <div class="hud-stat" id="skillCard">
          <span class="hud-icon" style="display:none;"></span>
          <div class="hud-info">
            <span class="hud-label">SKILL PTS :</span>
            <span class="hud-value" id="skillValue">0</span>
          </div>
        </div>
      </div>

      <div class="hud-right">
        <button id="skillBtn" class="neon-btn">SKILL TREE</button>
      </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <div id="comboBar">
        <div id="comboText">COMBO x0</div>
        <div id="comboFill"></div>
      </div>

      <div id="floatingText"></div>

      <div id="skillTooltip"></div>

      <div id="skillPanel" class="hidden">
        <div class="panel-inner">
          <div class="panel-header">
            <h2>SKILL TREE</h2>
            <button id="closeSkill" class="close-btn">✕</button>
          </div>
          <div class="skill-points">
            Points: <span id="availPoints">0</span>
            <span class="skill-points-sep">·</span>
            Money: <span id="availMoney">0</span>¢
          </div>
          <div id="skillGrid"></div>
        </div>
      </div>

      <!-- START SCREEN – clean, no border/background -->
      <div id="startScreen">
        <div id="fallingLeaves"></div>
        <div class="title-glow">
          <h1>CATCH-A-LEAF DEMO</h1>
          <p class="subtitle">Still in development, more features coming soon!</p>
          <button id="startBtn" class="neon-btn big">START</button>
        </div>
      </div>
    </div>
  </div>

  <script src="GameObject.js"></script>
  <script src="Particle.js"></script>
  <script src="Leaf.js"></script>
  <script src="Player.js"></script>
  <script src="SkillTree.js"></script>
  <script src="AudioManager.js"></script>
  <script src="Game.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('gameCanvas');
      if (canvas) {
        window.game = new Game(canvas);
      }
    });
  </script>

  <!-- FALLING LEAVES – using sprite images -->
  <script>
    (function createFallingLeaves() {
      const container = document.getElementById('fallingLeaves');
      if (!container) return;

      const leafCount = 20;
      const leafSprite = 'Sprites/normal_maple_leaf.png';

      for (let i = 0; i < leafCount; i++) {
        const img = document.createElement('img');
        img.src = leafSprite;
        img.className = 'falling-leaf';
        img.alt = 'leaf';
        img.style.left = Math.random() * 100 + '%';
        const size = 20 + Math.random() * 30;
        img.style.width = size + 'px';
        img.style.height = size + 'px';
        img.style.animationDuration = (6 + Math.random() * 10) + 's';
        img.style.animationDelay = (Math.random() * 12) + 's';
        img.style.opacity = 0.3 + Math.random() * 0.5;
        img.style.transform = `rotate(${Math.random() * 360}deg)`;
        container.appendChild(img);
      }
    })();
  </script>
</body>
</html>
